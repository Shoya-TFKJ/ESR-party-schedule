<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESR 企業パーティー 撮影スケジュール</title>
    <style>
        :root {
            --bg: #0d0d1a;
            --surface: #1a1a2e;
            --surface2: #16213e;
            --accent: #c9a84c;
            --ejima: #4fc3f7;
            --ichiyama: #f48fb1;
            --text: #e0e0e0;
            --muted: #666;
            --border: #2a2a4a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Helvetica Neue', Arial, 'Hiragino Sans', sans-serif;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(180deg, #1a1a2e 0%, #0d0d1a 100%);
            border-bottom: 1px solid var(--accent);
            padding: 28px 40px;
            text-align: center;
        }

        .header-date {
            color: var(--accent);
            font-size: 11px;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }

        .header-logo {
            height: 56px;
            width: auto;
            margin-bottom: 14px;
            object-fit: contain;
        }

        header h1 {
            font-size: 22px;
            font-weight: 300;
            letter-spacing: 6px;
            color: #fff;
        }

        .header-sub {
            margin-top: 8px;
            font-size: 11px;
            letter-spacing: 3px;
            color: var(--muted);
        }

        .header-stats {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 32px;
            margin-top: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--muted);
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 26px;
            font-weight: 200;
            letter-spacing: 2px;
            color: var(--accent);
        }

        .stat-unit {
            font-size: 12px;
            margin-left: 2px;
            color: var(--muted);
        }

        .stat-divider {
            width: 1px;
            height: 36px;
            background: var(--border);
        }

        .container {
            max-width: 860px;
            margin: 36px auto;
            padding: 0 20px;
        }

        /* 凡例 */
        .legend {
            display: flex;
            gap: 28px;
            justify-content: center;
            margin-bottom: 28px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            letter-spacing: 2px;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .legend-input {
            background: transparent;
            border: none;
            border-bottom: 1px dashed var(--border);
            color: var(--muted);
            font-size: 12px;
            letter-spacing: 2px;
            width: 100px;
            outline: none;
            padding: 2px 0;
            transition: border-color 0.2s;
        }

        .legend-input::placeholder { color: #444; }
        .legend-input:focus { border-bottom-color: var(--accent); color: var(--text); }

        /* アクションボタン */
        .actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 28px;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 7px 20px;
            border-radius: 3px;
            font-size: 11px;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.2s;
        }

        .btn:hover { border-color: var(--accent); color: var(--accent); }
        .btn.primary { border-color: var(--accent); color: var(--accent); }

        /* カラムヘッダー */
        .col-headers {
            display: grid;
            grid-template-columns: 72px 1fr 110px 110px;
            gap: 6px;
            margin-bottom: 8px;
            padding-left: 4px;
        }

        .col-header {
            text-align: center;
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--muted);
            padding: 6px 0;
        }

        .col-header.ejima { color: var(--ejima); }
        .col-header.ichiyama { color: var(--ichiyama); }

        /* セクション区切り */
        .section-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 18px 0 10px;
        }

        .section-divider::before,
        .section-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .section-label {
            font-size: 10px;
            color: var(--accent);
            letter-spacing: 4px;
        }

        /* イベントブロック */
        .event-block {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .event-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
        }

        .time-cell {
            font-size: 12px;
            color: var(--accent);
            font-weight: 600;
            letter-spacing: 1px;
            white-space: nowrap;
            min-width: 48px;
        }

        .event-name {
            font-size: 14px;
            font-weight: 500;
            color: #fff;
        }

        .event-input {
            background: transparent;
            border: none;
            border-bottom: 1px dashed var(--border);
            color: var(--text);
            font-size: 14px;
            font-weight: 500;
            flex: 1;
            outline: none;
            padding: 2px 0;
        }

        .event-input::placeholder { color: #444; font-weight: 400; }
        .event-input:focus { border-bottom-color: var(--accent); }

        /* 担当入力エリア */
        .event-assignments {
            padding: 10px 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .assignment-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .person-label {
            font-size: 10px;
            letter-spacing: 2px;
            font-weight: 600;
            min-width: 38px;
            padding-top: 4px;
        }

        .person-label.ichiyama { color: var(--ichiyama); }
        .person-label.ejima    { color: var(--ejima); }

        .task-input {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 4px;
            outline: none;
            width: 100%;
            font-size: 13px;
            line-height: 1.5;
            resize: none;
            padding: 6px 10px;
            font-family: inherit;
        }

        .task-input.ichiyama-input { color: var(--ichiyama); }
        .task-input.ichiyama-input::placeholder { color: rgba(244,143,177,0.25); }
        .task-input.ichiyama-input:focus { border-color: var(--ichiyama); }

        .task-input.ejima-input { color: var(--ejima); }
        .task-input.ejima-input::placeholder { color: rgba(79,195,247,0.25); }
        .task-input.ejima-input:focus { border-color: var(--ejima); }

        /* メモ行 */
        .note-row {
            padding: 0 14px 10px;
        }

        .note-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid #222;
            color: #ff8c00;
            font-size: 11px;
            padding: 4px 0;
            outline: none;
            width: 100%;
            transition: border-color 0.2s;
        }

        .note-input::placeholder { color: #444; }
        .note-input:focus { border-bottom-color: #ff8c00; }

        footer {
            text-align: center;
            padding: 36px;
            font-size: 10px;
            letter-spacing: 3px;
            color: #333;
        }

        /* メニューチェックリスト */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 6px;
            margin-bottom: 20px;
        }

        .menu-col-headers {
            display: grid;
            grid-template-columns: 1fr 64px 64px;
            gap: 8px;
            padding: 0 12px 6px;
        }

        .menu-col-h {
            text-align: center;
            font-size: 10px;
            letter-spacing: 2px;
        }

        .menu-col-h.ichiyama { color: var(--ichiyama); }
        .menu-col-h.ejima    { color: var(--ejima); }

        .menu-category {
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--accent);
            padding: 14px 0 6px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2px;
        }

        .menu-item {
            display: grid;
            grid-template-columns: 1fr 64px 64px;
            align-items: center;
            gap: 8px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 10px 12px;
            transition: border-color 0.2s;
        }

        .menu-item:hover { border-color: var(--border); }

        .menu-text {
            font-size: 12px;
            line-height: 1.5;
            color: var(--text);
        }

        .menu-shot-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            border-radius: 4px;
            border: 1px solid var(--border);
            padding: 6px 4px;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
            min-height: 44px;
        }

        .menu-shot-btn:hover { border-color: var(--accent); }

        .menu-shot-btn.on-ichiyama {
            background: rgba(244,143,177,0.12);
            border-color: var(--ichiyama);
        }

        .menu-shot-btn.on-ejima {
            background: rgba(79,195,247,0.12);
            border-color: var(--ejima);
        }

        .shot-icon { font-size: 14px; }

        .shot-label {
            font-size: 9px;
            letter-spacing: 1px;
            color: var(--muted);
        }

        .menu-shot-btn.on-ichiyama .shot-label { color: var(--ichiyama); }
        .menu-shot-btn.on-ejima    .shot-label { color: var(--ejima); }

        .menu-progress-wrap {
            margin-bottom: 36px;
        }

        .menu-progress-label {
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--muted);
            margin-bottom: 8px;
            text-align: right;
        }

        .menu-progress-bar-bg {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }

        .menu-progress-bar {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            transition: width 0.3s;
            width: 0%;
        }

        /* 保存ステータス */
        .save-status {
            text-align: center;
            font-size: 11px;
            letter-spacing: 2px;
            height: 18px;
            margin-bottom: 12px;
            transition: opacity 0.5s;
        }

        .save-status.ok    { color: var(--accent); }
        .save-status.error { color: #f48fb1; }

        /* モーダル */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open { display: flex; }

        .modal {
            background: var(--surface);
            border: 1px solid var(--accent);
            border-radius: 8px;
            padding: 32px;
            width: 420px;
            max-width: 90vw;
        }

        .modal h2 {
            font-size: 13px;
            letter-spacing: 3px;
            color: var(--accent);
            margin-bottom: 16px;
            font-weight: 400;
        }

        .modal p {
            font-size: 11px;
            color: var(--muted);
            line-height: 1.8;
            margin-bottom: 16px;
        }

        .modal input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-size: 12px;
            padding: 10px 12px;
            outline: none;
            margin-bottom: 16px;
        }

        .modal input:focus { border-color: var(--accent); }

        .modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        /* 固定保存ボタン */
        .fab-save {
            position: fixed;
            bottom: 32px;
            right: 32px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 50px;
            padding: 14px 28px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(201,168,76,0.4);
            transition: all 0.2s;
            z-index: 50;
        }

        .fab-save:hover {
            background: #e8d5a3;
            box-shadow: 0 6px 28px rgba(201,168,76,0.6);
            transform: translateY(-2px);
        }

        .fab-save:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .venue-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 40px;
        }

        .venue-img {
            width: 100%;
            height: auto;
            display: block;
        }

        @media print {
            body { background: #fff; color: #000; }
            .actions { display: none; }
            .event-cell { background: #f9f9f9; border-color: #ddd; }
            .assignment-cell { background: #f0f0f0; border-color: #ccc; }
        }
    </style>
</head>

<button class="fab-save" id="fab-save-btn" onclick="cloudSave()">保存</button>

<script>
const schedule = [
    { time: "15:00", label: "入り",                       section: "準備" },
    { time: "16:00", label: "",                            editable: true },
    { time: "17:00", label: "",                            editable: true },
    { time: "18:00", label: "開場・受付開始",              section: "本番" },
    { time: "18:30", label: "オープニング・MC登場" },
    { time: "18:31", label: "会社VTR放映" },
    { time: "18:36", label: "代表ご挨拶" },
    { time: "18:47", label: "乾杯のご挨拶" },
    { time: "18:55", label: "お食事とご歓談" },
    { time: "19:30", label: "ライブステージ" },
    { time: "20:00", label: "ステージ転換（お食事）" },
    { time: "20:05", label: "抽選会" },
    { time: "20:25", label: "締めのご挨拶" },
    { time: "20:30", label: "退出",                        section: "終了" },
];

let state = JSON.parse(localStorage.getItem('esr_state') || '{}');

function save() {
    localStorage.setItem('esr_state', JSON.stringify(state));
}

function taskChange(i, person, val) {
    if (!state[i]) state[i] = { ejima: '', ichiyama: '', note: '' };
    state[i][person] = val;
    save();
}

function noteChange(i, val) {
    if (!state[i]) state[i] = { ejima: false, ichiyama: false, note: '' };
    state[i].note = val;
    save();
}

function labelChange(i, val) {
    if (!state[i]) state[i] = { ejima: false, ichiyama: false, note: '' };
    state[i].label = val;
    save();
}

function resetAll() {
    if (confirm('割り当てとメモをすべてリセットしますか？')) {
        state = {};
        save();
        render();
    }
}

function render() {
    const el = document.getElementById('timeline');
    let html = '';
    let lastSection = '';

    schedule.forEach((ev, i) => {
        const s = state[i] || { ejima: '', ichiyama: '', note: '' };

        if (ev.section && ev.section !== lastSection) {
            lastSection = ev.section;
            html += `<div class="section-divider"><span class="section-label">${ev.section}</span></div>`;
        }

        const eventContent = ev.editable
            ? `<input class="event-input" type="text" placeholder="内容を入力..." value="${(s.label || '').replace(/"/g, '&quot;')}" oninput="labelChange(${i}, this.value)" />`
            : `<div class="event-name">${ev.label}</div>`;

        html += `
        <div class="event-block">
            <div class="event-header">
                <div class="time-cell">${ev.time}</div>
                ${eventContent}
            </div>
            <div class="event-assignments">
                <div class="assignment-row">
                    <span class="person-label ichiyama">市山</span>
                    <textarea class="task-input ichiyama-input" rows="2" placeholder="担当内容を入力..."
                        oninput="taskChange(${i},'ichiyama',this.value)">${(s.ichiyama || '').replace(/</g,'&lt;')}</textarea>
                </div>
                <div class="assignment-row">
                    <span class="person-label ejima">江島</span>
                    <textarea class="task-input ejima-input" rows="2" placeholder="担当内容を入力..."
                        oninput="taskChange(${i},'ejima',this.value)">${(s.ejima || '').replace(/</g,'&lt;')}</textarea>
                </div>
            </div>
            <div class="note-row">
                <input class="note-input" type="text" placeholder="メモ・撮影指示を入力..."
                    value="${(s.note || '').replace(/"/g, '&quot;')}"
                    oninput="noteChange(${i}, this.value)" />
            </div>
        </div>`;
    });

    el.innerHTML = html;
}

render();

// ── メニューチェックリスト ──
const menuItems = [
    { category: "ASSORTED COCKTAIL SELECTION" },
    { id: "m1",  name: "グリーンピースのムースと小海老のミントタブレ ういきょうと新玉葱のクロッカン" },
    { id: "m2",  name: "九州産 黒毛和牛とズッキーニのキッシュ セルベルドカニュ" },
    { id: "m3",  name: "海老カツのトルティーヤロール コックソース" },
    { category: "COLD SELECTION" },

    { id: "m5",  name: "福岡県産みらいサーモンと鮪の洋風手毬寿司 花穂添え" },
    { id: "m6",  name: "日田山椒香るよだれ鶏" },

    { id: "m8",  name: "阿蘇自然豚生ハムとモッツァレラチーズ 福岡県産トマト バジルの香り" },
    { id: "m9",  name: "桜海老とシェルフィッシュ 九州野菜の冷たい蝶々パスタ" },

    { category: "HOT SELECTION" },

    { id: "m13", name: "海老のクリーミーマヨネーズ和え" },
    { id: "m14", name: "みつせ鶏の油淋鶏 メランジェサラダ添え" },
    { id: "m15", name: "RCFオリジナル九州産 ビーフカレー＆ライス" },
    { id: "m16", name: "九州ソーセージとザワークラウト インカポテト" },
    { id: "m17", name: "海鮮焼きそば" },

let menuState = JSON.parse(localStorage.getItem('esr_menu') || '{}');

function saveMenu() {
    localStorage.setItem('esr_menu', JSON.stringify(menuState));
}

function toggleMenu(id, person) {
    if (!menuState[id]) menuState[id] = { ichiyama: false, ejima: false };
    menuState[id][person] = !menuState[id][person];
    saveMenu();
    renderMenu();
}

function renderMenu() {
    const el = document.getElementById('menu-checklist');
    const dishes = menuItems.filter(m => m.id);
    const total = dishes.length;
    const checked = dishes.filter(m => {
        const s = menuState[m.id] || {};
        return s.ichiyama || s.ejima;
    }).length;

    let html = '';
    menuItems.forEach(item => {
        if (item.category) {
            html += `<div class="menu-category">${item.category}</div>`;
        } else {
            const s = menuState[item.id] || { ichiyama: false, ejima: false };
            html += `
            <div class="menu-item">
                <div class="menu-text">${item.name}</div>
                <div class="menu-shot-btn ${s.ichiyama ? 'on-ichiyama' : ''}" onclick="toggleMenu('${item.id}','ichiyama')">
                    <div class="shot-icon">${s.ichiyama ? '📷' : '·'}</div>
                    <div class="shot-label">${s.ichiyama ? '撮影済' : '未撮影'}</div>
                </div>
                <div class="menu-shot-btn ${s.ejima ? 'on-ejima' : ''}" onclick="toggleMenu('${item.id}','ejima')">
                    <div class="shot-icon">${s.ejima ? '📷' : '·'}</div>
                    <div class="shot-label">${s.ejima ? '撮影済' : '未撮影'}</div>
                </div>
            </div>`;
        }
    });

    el.innerHTML = html;
    document.getElementById('menu-count').textContent = checked;
    document.getElementById('menu-total').textContent = total;
    document.getElementById('menu-bar').style.width = (total ? (checked / total * 100) : 0) + '%';
}

renderMenu();

// ── データ出力 ──
function exportData() {
    const data = JSON.stringify({ state, menuState }, null, 2);
    const ta = document.createElement('textarea');
    ta.value = data;
    ta.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:80vw;height:60vh;z-index:999;background:#1a1a2e;color:#e0e0e0;border:1px solid #c9a84c;border-radius:8px;padding:16px;font-size:11px;';
    document.body.appendChild(ta);
    ta.select();
    const close = document.createElement('button');
    close.textContent = '閉じる';
    close.style.cssText = 'position:fixed;top:calc(50% - 30vh - 20px);left:50%;transform:translateX(-50%);z-index:1000;background:#c9a84c;color:#000;border:none;padding:8px 24px;border-radius:4px;cursor:pointer;font-size:12px;';
    close.onclick = () => { document.body.removeChild(ta); document.body.removeChild(close); };
    document.body.appendChild(close);
}

// ── ブラウザ保存 ──
function showStatus(msg, type) {
    const el = document.getElementById('save-status');
    el.textContent = msg;
    el.className = 'save-status ' + type;
    setTimeout(() => { el.textContent = ''; el.className = 'save-status'; }, 3000);
}

function cloudSave() {
    localStorage.setItem('esr_state', JSON.stringify(state));
    localStorage.setItem('esr_menu', JSON.stringify(menuState));
    const btn = document.getElementById('fab-save-btn');
    btn.textContent = '✓ 保存済み';
    showStatus('✓ ブラウザに保存しました', 'ok');
    setTimeout(() => { btn.textContent = '保存'; }, 2000);
}
